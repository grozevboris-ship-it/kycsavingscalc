version: "3.8"

services:
  traefik:
    image: traefik:v3.0
    container_name: kycsavingscalc-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=kycsavingscalc-network"
      - "--entrypoints.web.address=:80"
    ports:
      - "3000:80"
      - "8081:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - kycsavingscalc-network

  app:
    build: .
    container_name: kycsavingscalc-app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`localhost`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.services.app.loadbalancer.server.port=8080"
    networks:
      - kycsavingscalc-network
    depends_on:
      - traefik

networks:
  kycsavingscalc-network:
    name: kycsavingscalc-network
    driver: bridge
